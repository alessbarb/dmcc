version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: dmcc-postgres
    environment:
      POSTGRES_DB: dmcc
      POSTGRES_USER: dmcc
      POSTGRES_PASSWORD: dmcc_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
