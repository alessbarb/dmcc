services:
  postgres:
    image: postgres:15-alpine
    container_name: dmcc-postgres
    # Local development credentials only. Do not reuse these values in staging or production.
    environment:
      POSTGRES_DB: dmcc
      POSTGRES_USER: dmcc
      POSTGRES_PASSWORD: dmcc_password
    ports:
      # Bind Postgres to loopback so the development database is not exposed on the LAN.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
