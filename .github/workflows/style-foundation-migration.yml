name: Migrate style foundation

on:
  push:
    branches: [refactor/style-foundation]

permissions:
  contents: write

concurrency:
  group: style-foundation-migration
  cancel-in-progress: false

jobs:
  migrate:
    if: "!contains(github.event.head_commit.message, '[style-foundation-migrated]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refactor/style-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: node scripts/styles/migrateStyleFoundation.mjs
      - run: npm run styles:audit:update-baseline
      - run: npm run styles:audit:check
      - run: npm test -- --run tests/frontend/styleAuditContracts.test.ts tests/frontend/visualSystem.test.ts
      - run: npm run typecheck:app
      - name: Commit migrated foundation and remove temporary migration files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/styles/migrateStyleFoundation.mjs .github/workflows/style-foundation-migration.yml
          git add -A
          git add -f docs/audits/style-audit-baseline.json docs/audits/style-audit-baseline.md
          git commit -m "refactor(styles): establish single global foundation [style-foundation-migrated]"
          git push origin HEAD:refactor/style-foundation
