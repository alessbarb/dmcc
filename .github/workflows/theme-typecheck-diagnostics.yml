name: Theme typecheck diagnostics

on:
  push:
    branches: [feat/theme-contract-foundation]
    paths:
      - .github/workflows/theme-typecheck-diagnostics.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/theme-contract-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Capture typecheck output
        run: |
          mkdir -p .artifacts
          npm run typecheck:all > .artifacts/theme-typecheck.log 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .artifacts/theme-typecheck.log
          git commit -m "chore(theme): capture typecheck diagnostics"
          git push origin HEAD:feat/theme-contract-foundation
