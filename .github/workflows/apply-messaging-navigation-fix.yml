name: Apply messaging navigation fix

on:
  push:
    branches:
      - fix/messaging-navigation-access

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/messaging-navigation-access
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/apply-messaging-navigation-fix.mjs
      - name: Commit navigation fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Expose campaign messaging in primary navigation"
          git push
