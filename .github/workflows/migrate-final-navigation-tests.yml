name: Migrate final navigation tests

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  migrate:
    if: github.base_ref == 'agent/p1-complete'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p1-complete
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Migrate final navigation references
        run: node scripts/migrate-final-navigation-tests.mjs
      - name: Commit final navigation references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/frontend/dm/hub/DmHubPage.tsx src/frontend/dm/pages/OnboardingPage.tsx src/frontend/dm/pages/PremadeCampaignPreviewPage.tsx tests/frontend/imagePicker.test.ts
          git commit -m "Migrate final campaign navigation references"
          git push origin HEAD:agent/p1-complete
