name: Consolidate i18n dictionaries

on:
  push:
    branches: [agent/p1-complete]
    paths:
      - scripts/consolidate-i18n.mjs
      - .github/workflows/consolidate-i18n.yml

permissions:
  contents: write

jobs:
  consolidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p1-complete
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Consolidate translations into primary dictionaries
        run: node scripts/consolidate-i18n.mjs
      - name: Commit consolidated dictionaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/shared/i18n/dictionaries scripts/consolidate-i18n.mjs .github/workflows/consolidate-i18n.yml
          git commit -m "Consolidate P1 copy in primary dictionaries [i18n-codmod]"
          git push origin HEAD:agent/p1-complete
