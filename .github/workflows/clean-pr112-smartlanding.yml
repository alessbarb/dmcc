name: Clean PR 112 SmartLanding diff

on:
  push:
    branches:
      - fix/player-dm-messaging-dock

permissions:
  contents: write

jobs:
  clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/player-dm-messaging-dock
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/clean-pr112-smartlanding.mjs
      - name: Commit focused cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep PR 112 focused and remove unrelated legacy changes"
          git push
