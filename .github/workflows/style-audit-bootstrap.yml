name: Bootstrap style audit baseline

on:
  push:
    branches: [feat/style-audit-baseline]

permissions:
  contents: write

concurrency:
  group: style-audit-bootstrap-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap:
    if: "!contains(github.event.head_commit.message, '[style-audit-baseline]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/style-audit-baseline
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run styles:audit:update-baseline
      - run: npm run styles:audit:check
      - run: npm test -- --run tests/frontend/styleAuditContracts.test.ts

      - name: Commit generated baseline and remove bootstrap workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/audits/style-audit-baseline.json docs/audits/style-audit-baseline.md
          git add -f .artifacts/style-audit.json .artifacts/style-audit.md
          git rm .github/workflows/style-audit-bootstrap.yml
          git commit -m "docs(styles): record mechanical audit baseline [style-audit-baseline]"
          git push origin HEAD:feat/style-audit-baseline
