name: Test diagnostics

on:
  pull_request:
    types: [reopened]

permissions:
  contents: read

jobs:
  diagnostics:
    if: github.base_ref == 'agent/p1-complete'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dmcc
          POSTGRES_PASSWORD: dmcc_password
          POSTGRES_DB: dmcc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmcc -d dmcc"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://dmcc:dmcc_password@127.0.0.1:5432/dmcc
      DATABASE_SSL_MODE: disable
      NODE_ENV: test
      SESSION_SECRET: dmcc-ci-session-secret-2026-07-11-only-for-automated-tests
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p1-complete
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci >/dev/null
      - name: Prepare database
        run: |
          printf 'DATABASE_URL=%s\nDATABASE_SSL_MODE=disable\n' "$DATABASE_URL" > .env
          npm run db:migrate >/dev/null
      - name: Capture test diagnostics
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          status=$?
          echo "$status" > test.status
          tail -n 400 test.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: |
            test.log
            test.status
          retention-days: 1
