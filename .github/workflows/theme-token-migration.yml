name: Theme token migration

on:
  push:
    branches: [feat/theme-contract-foundation]
    paths:
      - scripts/theme/run-theme-token-migration.mjs
      - .github/workflows/theme-token-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/theme-contract-foundation
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Migrate theme tokens
        run: node scripts/theme/run-theme-token-migration.mjs

      - name: Commit migrated sources
        run: |
          if git diff --quiet; then
            echo "No migration changes were produced."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(theme): migrate frontend consumers to v1 tokens"
          git push origin HEAD:feat/theme-contract-foundation
