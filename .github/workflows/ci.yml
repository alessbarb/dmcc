name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  campaign-status-cleanup:
    name: Apply canonical campaign lifecycle states
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/p0-account-security-and-purge-operations' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply directed status replacements
        run: |
          python3 <<'PY'
          from pathlib import Path

          replacements = {
              Path('src/backend/server/web/routes/accountWebRoutes.ts'): [
                  ('campaign.status !== "deleted"', 'campaign.status !== "trashed"'),
                  ('ne(schema.campaigns.status, "deleted")', 'ne(schema.campaigns.status, "trashed")'),
              ],
              Path('src/frontend/account/AccountPage.tsx'): [
                  ('m.campaignStatus !== "archived" && m.campaignStatus !== "deleted"',
                   'm.campaignStatus !== "trashed"'),
                  ('Boolean(m.revokedAt) || m.campaignStatus === "archived" || m.campaignStatus === "deleted"',
                   'Boolean(m.revokedAt) || m.campaignStatus === "trashed"'),
              ],
              Path('src/backend/server/web/routes/campaignTemplateWebRoutes.ts'): [
                  ("sql`${schema.campaigns.status} <> 'deleted'`", "sql`${schema.campaigns.status} <> 'trashed'`"),
              ],
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f'Expected text not found in {path}: {old}')
                  text = text.replace(old, new)
              if text != original:
                  path.write_text(text, encoding='utf-8')

          Path('tests/backend/campaignLifecycleVocabulary.test.ts').write_text('''import { readFileSync } from "node:fs";\nimport { describe, expect, it } from "vitest";\n\nconst read = (path: string) => readFileSync(path, "utf8");\n\ndescribe("canonical campaign lifecycle vocabulary", () => {\n  it("uses importing, active and trashed in account and template flows", () => {\n    const accountRoutes = read("src/backend/server/web/routes/accountWebRoutes.ts");\n    const accountPage = read("src/frontend/account/AccountPage.tsx");\n    const templateRoutes = read("src/backend/server/web/routes/campaignTemplateWebRoutes.ts");\n\n    expect(accountRoutes).not.toContain('campaign.status !== "deleted"');\n    expect(accountRoutes).not.toContain('ne(schema.campaigns.status, "deleted")');\n    expect(accountRoutes).toContain('campaign.status !== "trashed"');\n    expect(accountRoutes).toContain('ne(schema.campaigns.status, "trashed")');\n\n    expect(accountPage).not.toContain('campaignStatus === "archived"');\n    expect(accountPage).not.toContain('campaignStatus === "deleted"');\n    expect(accountPage).toContain('campaignStatus === "trashed"');\n\n    expect(templateRoutes).not.toContain("campaigns.status} <> 'deleted'");\n    expect(templateRoutes).toContain("campaigns.status} <> 'trashed'");\n  });\n});\n''', encoding='utf-8')
          PY

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/backend/server/web/routes/accountWebRoutes.ts \
                  src/frontend/account/AccountPage.tsx \
                  src/backend/server/web/routes/campaignTemplateWebRoutes.ts \
                  tests/backend/campaignLifecycleVocabulary.test.ts
          git commit -m "fix(campaigns): use canonical lifecycle states"
          git push origin HEAD:${{ github.head_ref }}

  quality:
    name: Typecheck, test and build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dmcc
          POSTGRES_PASSWORD: dmcc_password
          POSTGRES_DB: dmcc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmcc -d dmcc_test"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://dmcc:dmcc_password@127.0.0.1:5432/dmcc_test
      DATABASE_SSL_MODE: disable
      SESSION_SECRET: dmcc-ci-session-secret-2026-07-11-only-for-automated-tests

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Migrate test database
        env:
          NODE_ENV: test
        run: npm run db:migrate

      - name: Lint
        run: npm run lint

      - name: Dependency boundaries
        run: npm run audit:deps

      - name: Typecheck
        run: npm run typecheck:all

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

  e2e:
    name: Browser smoke tests
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dmcc
          POSTGRES_PASSWORD: dmcc_password
          POSTGRES_DB: dmcc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmcc -d dmcc_test"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://dmcc:dmcc_password@127.0.0.1:5432/dmcc_test
      DATABASE_SSL_MODE: disable
      SESSION_SECRET: dmcc-ci-session-secret-2026-07-11-only-for-automated-tests

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Migrate test database
        env:
          NODE_ENV: test
        run: npm run db:migrate

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          echo "version=$(node -p "require('./node_modules/@playwright/test/package.json').version")" \
            >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
