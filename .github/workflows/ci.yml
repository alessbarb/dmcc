name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, test and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dmcc
          POSTGRES_PASSWORD: dmcc_password
          POSTGRES_DB: dmcc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmcc -d dmcc"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://dmcc:dmcc_password@127.0.0.1:5432/dmcc
      DATABASE_SSL_MODE: disable
      NODE_ENV: test
      SESSION_SECRET: dmcc-ci-session-secret-2026-07-11-only-for-automated-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare database environment
        run: |
          printf 'DATABASE_URL=%s\nDATABASE_SSL_MODE=disable\n' "$DATABASE_URL" > .env
          npm run db:migrate
      - run: npm run typecheck:all
      - run: npm test
      - run: npm run build

  e2e:
    name: Browser smoke tests
    runs-on: ubuntu-24.04
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dmcc
          POSTGRES_PASSWORD: dmcc_password
          POSTGRES_DB: dmcc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmcc -d dmcc"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://dmcc:dmcc_password@127.0.0.1:5432/dmcc
      DATABASE_SSL_MODE: disable
      NODE_ENV: test
      SESSION_SECRET: dmcc-ci-session-secret-2026-07-11-only-for-automated-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Prepare database environment
        run: |
          printf 'DATABASE_URL=%s\nDATABASE_SSL_MODE=disable\n' "$DATABASE_URL" > .env
          npm run db:migrate

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          echo "version=$(node -p "require('./node_modules/@playwright/test/package.json').version")" \
            >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - run: npm run test:e2e

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
          