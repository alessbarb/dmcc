name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, test and build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dmcc
          POSTGRES_PASSWORD: dmcc_password
          POSTGRES_DB: dmcc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmcc -d dmcc_test"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://dmcc:dmcc_password@127.0.0.1:5432/dmcc_test
      DATABASE_SSL_MODE: disable
      SESSION_SECRET: dmcc-ci-session-secret-2026-07-11-only-for-automated-tests

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Migrate test database
        env:
          NODE_ENV: test
        run: npm run db:migrate

      - name: Lint
        run: npm run lint

      - name: Dependency boundaries
        run: npm run audit:deps

      - name: Typecheck
        run: |
          set -o pipefail
          npm run typecheck:all 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

  e2e:
    name: Browser smoke tests
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dmcc
          POSTGRES_PASSWORD: dmcc_password
          POSTGRES_DB: dmcc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmcc -d dmcc_test"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://dmcc:dmcc_password@127.0.0.1:5432/dmcc_test
      DATABASE_SSL_MODE: disable
      SESSION_SECRET: dmcc-ci-session-secret-2026-07-11-only-for-automated-tests

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Migrate test database
        env:
          NODE_ENV: test
        run: npm run db:migrate

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          echo "version=$(node -p "require('./node_modules/@playwright/test/package.json').version")" \
            >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
