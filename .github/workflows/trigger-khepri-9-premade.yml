name: Trigger Khepri-9 premade build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-khepri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-khepri-9-premade
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Extract embedded premade bundle
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, pathlib, re, tarfile
          workflow = pathlib.Path('.github/workflows/apply-khepri-9-premade.yml').read_text()
          match = re.search(r"printf '%s' '([^']+)' \| base64 -d", workflow)
          if not match:
              raise SystemExit('Embedded Khepri-9 bundle not found')
          archive = pathlib.Path('/tmp/khepri_bundle.tgz')
          archive.write_bytes(base64.b64decode(match.group(1)))
          target = pathlib.Path('/tmp/khepri_bundle')
          target.mkdir(parents=True, exist_ok=True)
          with tarfile.open(archive, 'r:gz') as bundle:
              bundle.extractall(target)
          PY
          mkdir -p public/campaign-templates/khepri_9/locales
          cp /tmp/khepri_bundle/template.json public/campaign-templates/khepri_9/template.json
          cp /tmp/khepri_bundle/locales/en.json public/campaign-templates/khepri_9/locales/en.json
          cp /tmp/khepri_bundle/locales/es.json public/campaign-templates/khepri_9/locales/es.json
          cp /tmp/khepri_bundle/manifest.json public/campaign-templates/manifest.json
      - run: npm ci
      - name: Validate campaign templates
        run: |
          npm run templates:validate
          npm run templates:build:check
      - name: Commit Khepri-9
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add public/campaign-templates/manifest.json public/campaign-templates/khepri_9
          git commit -m 'feat(premades): add Drift at Khepri-9'
          git push origin HEAD:agent/add-khepri-9-premade
