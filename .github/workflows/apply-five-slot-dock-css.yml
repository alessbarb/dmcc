name: Apply five-slot dock CSS migration

on:
  push:
    branches:
      - fix/shared-five-slot-mobile-dock

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/shared-five-slot-mobile-dock
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/apply-five-slot-dock-css.mjs
      - name: Commit shared dock CSS migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make five-slot dock visible in every mobile workspace"
          git push
