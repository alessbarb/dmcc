name: Style architecture audit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: style-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Check style architecture ratchet
        run: npm run styles:audit:check
      - name: Run style audit contract tests
        run: npm test -- --run tests/frontend/styleAuditContracts.test.ts
      - name: Upload current audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: style-audit-report
          path: .artifacts/style-audit.*
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
