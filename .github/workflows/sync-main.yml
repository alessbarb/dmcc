name: Sync main into P1

on:
  push:
    branches: [agent/p1-complete]
    paths:
      - .github/workflows/sync-main.yml

permissions:
  contents: write

concurrency:
  group: sync-main-agent-p1-complete
  cancel-in-progress: false

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p1-complete
          fetch-depth: 0
      - name: Merge current main into P1
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            git checkout --ours .github/workflows/ci.yml
            git checkout --ours src/backend/server/web/registerWebRoutes.ts
            git rm -f src/backend/server/web/routes/dmDashboardWebRoutes.ts
            git add .github/workflows/ci.yml src/backend/server/web/registerWebRoutes.ts
          fi

          unresolved="$(git diff --name-only --diff-filter=U)"
          if [ -n "$unresolved" ]; then
            printf 'Unresolved merge conflicts:\n%s\n' "$unresolved" >&2
            exit 1
          fi

          git rm .github/workflows/sync-main.yml
          git add -A
          git commit -m "Merge main into P1 branch"
          git push origin HEAD:agent/p1-complete
