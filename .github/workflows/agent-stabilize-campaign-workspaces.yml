name: Apply campaign workspace stabilization

on:
  push:
    branches: [agent/stabilize-campaign-workspaces]
    paths:
      - scripts/agent_stabilize_campaign_workspaces.py
      - .github/workflows/agent-stabilize-campaign-workspaces.yml
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  stabilize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dmcc
          POSTGRES_PASSWORD: dmcc_password
          POSTGRES_DB: dmcc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmcc -d dmcc_test"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://dmcc:dmcc_password@127.0.0.1:5432/dmcc_test
      DATABASE_SSL_MODE: disable
      SESSION_SECRET: dmcc-agent-stabilization-session-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/stabilize-campaign-workspaces

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Align transformer with current main
        shell: bash
        run: |
          cat > /tmp/transformer.patch.gz.b64 <<'PAYLOAD'
          
          PAYLOAD
          base64 -d /tmp/transformer.patch.gz.b64 | gzip -dc > /tmp/transformer.patch
          patch -p1 < /tmp/transformer.patch

      - name: Apply functional stabilization
        run: python3 scripts/agent_stabilize_campaign_workspaces.py

      - name: Apply validated cleanup patch
        shell: bash
        run: |
          cat > /tmp/manual.patch.gz.b64 <<'PAYLOAD'
          ...