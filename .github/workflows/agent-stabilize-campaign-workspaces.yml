name: Apply campaign workspace stabilization

on:
  push:
    branches: [agent/stabilize-campaign-workspaces]
    paths:
      - scripts/agent_stabilize_campaign_workspaces.py
      - .github/workflows/agent-stabilize-campaign-workspaces.yml
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  stabilize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dmcc
          POSTGRES_PASSWORD: dmcc_password
          POSTGRES_DB: dmcc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dmcc -d dmcc_test"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://dmcc:dmcc_password@127.0.0.1:5432/dmcc_test
      DATABASE_SSL_MODE: disable
      SESSION_SECRET: dmcc-agent-stabilization-session-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/stabilize-campaign-workspaces

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Apply guarded source transformations
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("scripts/agent_stabilize_campaign_workspaces.py")
          content = path.read_text(encoding="utf-8")
          content = content.replace(
              "                         onChange={(e) => {\\n                           setSelectedItemType(e.target.value);",
              "                        onChange={(e) => {\\n                          setSelectedItemType(e.target.value);",
          )
          content = content.replace(
              "                         <option value=\"canvas\">{t(\"notebooks.type.canvas\") || \"Canvas\"}</option>\\n",
              "                        <option value=\"canvas\">{t(\"notebooks.type.canvas\") || \"Canvas\"}</option>\\n",
          )
          content = content.replace(
              "replace_once(\"src/core/application/commandBus.ts\", '        status: command.status as any,', '        status: \"planned\" as const,')",
              """sub_once(
              "src/core/application/commandBus.ts",
              r'(case "CreateStoryThread": \\{.*?status:) command\\.status as any,',
              r'\\1 "planned" as const,',
              re.S,
          )""",
          )
          content = content.replace(
              """replace_once(
              "src/core/application/commandBus.ts",
              '      if (!existing) throw new Error(`Story step not found: ${command.stepId}`);\\n\\n      if (!state.sessions.has(command.plannedSessionId)) {',
              '      if (!existing) throw new Error(`Story step not found: ${command.stepId}`);\\n      if (existing.status === "resolved" || existing.status === "discarded") {\\n        throw new Error("Cannot schedule a terminal story step");\\n      }\\n      if (command.plannedSessionOrder < 0) {\\n        throw new Error("plannedSessionOrder must be non-negative");\\n      }\\n\\n      if (!state.sessions.has(command.plannedSessionId)) {',
          )""",
              """sub_once(
              "src/core/application/commandBus.ts",
              r'(case "ScheduleStoryStep": \\{.*?if \\(!existing\\) throw new Error\\(`Story step not found: \\$\\{command\\.stepId\\}`\\);)\\n\\n      if \\(!state\\.sessions\\.has\\(command\\.plannedSessionId\\)\\)',
              r'\\1\\n      if (existing.status === "resolved" || existing.status === "discarded") {\\n        throw new Error("Cannot schedule a terminal story step");\\n      }\\n      if (command.plannedSessionOrder < 0) {\\n        throw new Error("plannedSessionOrder must be non-negative");\\n      }\\n\\n      if (!state.sessions.has(command.plannedSessionId))',
              re.S,
          )""",
          )
          path.write_text(content, encoding="utf-8")
          PY
          set -o pipefail
          python3 scripts/agent_stabilize_campaign_workspaces.py 2>&1 | tee stabilization-apply.log

      - name: Upload transformation diagnostics
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: stabilization-apply-log
          path: stabilization-apply.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop after transformation failure
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Migrate test database
        run: npm run db:migrate

      - name: Lint
        run: npm run lint

      - name: Dependency boundaries
        run: npm run audit:deps

      - name: Typecheck
        run: npm run typecheck:all

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Commit validated stabilization
        run: |
          rm scripts/agent_stabilize_campaign_workspaces.py
          rm .github/workflows/agent-stabilize-campaign-workspaces.yml
          git config user.name "dmcc-stabilization-agent"
          git config user.email "alessbarb@gmail.com"
          git add -A
          git commit -m "Stabilize campaign workspaces"
          git push origin HEAD:agent/stabilize-campaign-workspaces
