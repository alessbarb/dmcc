name: Apply messaging UI codemod

on:
  push:
    branches:
      - fix/player-proposal-conversation-ui

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/player-proposal-conversation-ui
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/apply-messaging-codemod.mjs
      - name: Commit transformed messaging UI
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove legacy proposal messaging UI"
          git push
