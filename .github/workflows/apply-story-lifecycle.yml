name: Apply story lifecycle stabilization

on:
  push:
    branches: [agent/stabilize-campaign-workspaces]
    paths:
      - scripts/story-lifecycle.patch.gz.b64
      - .github/workflows/apply-story-lifecycle.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/stabilize-campaign-workspaces

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Apply story lifecycle patch
        run: |
          base64 -d scripts/story-lifecycle.patch.gz.b64 | gzip -dc > /tmp/story-lifecycle.patch
          patch -p1 < /tmp/story-lifecycle.patch

      - name: Typecheck
        run: npm run typecheck:all

      - name: Lint
        run: npm run lint -- --quiet

      - name: Story lifecycle tests
        run: npx vitest run tests/core/workspaceStabilization.test.ts tests/core/story.test.ts

      - name: Publish story lifecycle stabilization
        run: |
          git restore --source=HEAD -- .github/workflows/apply-story-lifecycle.yml
          rm scripts/story-lifecycle.patch.gz.b64
          git config user.name "dmcc-stabilization-agent"
          git config user.email "alessbarb@gmail.com"
          git add -A
          git commit -m "Harden story lifecycle transitions"
          git push origin HEAD:agent/stabilize-campaign-workspaces
