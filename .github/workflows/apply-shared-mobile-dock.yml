name: Apply shared mobile dock refactor

on:
  push:
    branches:
      - fix/player-dm-messaging-dock

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/player-dm-messaging-dock
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/apply-shared-mobile-dock.mjs
      - name: Commit shared mobile dock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use one shared four-slot mobile dock"
          git push
